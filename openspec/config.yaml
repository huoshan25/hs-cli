schema: spec-driven

context: |
  项目：hs-cli，一个前端开发 CLI 工具
  结构：pnpm workspaces monorepo
  主包：@huo-shan/cli（apps/cli），bin 命令为 hs-cli
  工具包：@huo-shan/utils（packages/utils），发布到 npm
  技术栈：TypeScript、Commander.js、Inquirer.js、Chalk
  构建：tsc（TypeScript 编译器），ES2018 target，CommonJS 模块
  包管理：pnpm 7+，Node.js 16+
  代码规范：ESLint（TypeScript），strict 模式，无 Prettier 配置
  版本管理：手动管理，CHANGELOG 由 AI 基于 openspec 生成
  测试：Vitest
  支持模板：Vue3、Nuxt3，可选特性包括 TypeScript、Router、Pinia、UnoCSS、Vitest 等
  提交规范：conventional commits

rules:
  proposal:
    - 使用中文撰写
    - 包含 Why / What Changes / Impact
  specs:
    - Requirement 使用 SHALL/MUST 规范语气
    - 每个 Requirement 至少包含一个 Scenario
    - Scenario 使用 Given/When/Then 或 WHEN/THEN 表达
  tasks:
    - 任务拆分为可验证的小步骤
    - 包含实现、测试、校验三个阶段
  development:
    - 项目规范以简洁、可维护、可追溯为原则。
    - 若变更涉及 packages/*，建议补充 logs/packages-change-log.md（非强制）。
    - 变更日志推荐字段：日期、包名、变更类型、摘要、影响范围、验证结果、备注。
    - 变更类型建议使用：feat | fix | refactor | chore | docs。
    - 代码注释使用文档注释（/** */），尽量避免使用行内注释（//）。
